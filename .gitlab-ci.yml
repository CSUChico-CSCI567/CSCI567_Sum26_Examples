stages:
  - deploy

create-pages:
  image: gmeligio/flutter-web:3.44.6
  stage: deploy
  before_script:
    - cd counterexample
    - flutter pub get
  script:
    - flutter build web
    - cp -r build/web ../public
  pages:
    publish: public
  rules:
    - if: $CI_COMMIT_BRANCH == "webDeploy"
  environment: production